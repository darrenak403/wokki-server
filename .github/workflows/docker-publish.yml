# Build & push wokki-backend to Docker Hub (or compatible registry).
#
# Required GitHub repository secrets:
#   DOCKER_USERNAME — Docker Hub / registry username
#   DOCKER_PASSWORD — Docker Hub access token or registry password
#
# Prod server docker/.env: set DOCKER_USERNAME (same value) for compose image name.
# Dokploy injects env at deploy — no docker/.env file required on server.

name: Docker publish

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docker/Dockerfile"
      - "Directory.Build.props"
      - "global.json"
      - "Wokki.slnx"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: wokki-backend

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
