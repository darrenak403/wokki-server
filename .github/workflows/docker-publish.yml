# Build & push wokki-backend to Docker Hub, then auto-trigger Dokploy redeploy + health check.
# GitHub repo secrets: DOCKER_USERNAME, DOCKER_PASSWORD (build/push)
#                      DOKPLOY_WEBHOOK_URL (required), DOKPLOY_API_TOKEN (optional, only if Dokploy webhook needs Authorization header)
# Mọi config runtime khác → env Dokploy / docker/.env

name: Docker publish

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docker/Dockerfile"
      - "Directory.Build.props"
      - "global.json"
      - "Wokki.slnx"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: wokki-backend

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push (attempt 1)
        id: build_push_1
        uses: docker/build-push-action@v6
        continue-on-error: true
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (attempt 2)
        id: build_push_2
        if: steps.build_push_1.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure build and push succeeded
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        run: |
          echo "Both build/push attempts failed."
          exit 1

      - name: Verify latest tag is pullable and non-Alpine
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "Verifying $IMAGE"

          for attempt in 1 2 3 4 5; do
            echo "Verification attempt $attempt/5"
            docker pull "$IMAGE"
            if docker run --rm --entrypoint cat "$IMAGE" /etc/os-release | grep -q "Alpine"; then
              echo "Image still reports Alpine; waiting for registry consistency..."
              sleep 10
              continue
            fi

            echo "Verified non-Alpine runtime image."
            exit 0
          done

          echo "latest tag is still Alpine after retries; failing publish."
          exit 1

  deploy:
    name: Deploy to Dokploy
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${DOKPLOY_WEBHOOK_URL:-}" ]; then
            echo "DOKPLOY_WEBHOOK_URL secret is not set — skipping auto-deploy. See docker/README.md."
            exit 1
          fi
          AUTH_HEADER=()
          if [ -n "${DOKPLOY_API_TOKEN:-}" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer $DOKPLOY_API_TOKEN")
          fi
          # Dokploy's deploy webhook expects GET (the URL itself carries the auth token) —
          # POST returns 400. See docker/README.md for how this URL is generated.
          HTTP_CODE=$(curl -sS -o /tmp/dokploy_response.txt -w "%{http_code}" "${AUTH_HEADER[@]}" "$DOKPLOY_WEBHOOK_URL")
          echo "Dokploy webhook response ($HTTP_CODE):"
          cat /tmp/dokploy_response.txt
          echo
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Dokploy webhook call failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Wait for rollout and verify health
        env:
          HEALTH_URL: ${{ vars.API_HEALTH_URL || 'https://api.wokki.io.vn/health/' }}
        run: |
          set -euo pipefail
          echo "Waiting for Dokploy to pull image and restart container..."
          sleep 15
          for attempt in $(seq 1 20); do
            echo "Health check attempt $attempt/20: $HEALTH_URL"
            if curl -fsS "$HEALTH_URL" >/dev/null; then
              echo "Deploy verified healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Deploy did not become healthy in time — check Dokploy logs and roll back if needed."
          exit 1
