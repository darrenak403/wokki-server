# Build & push wokki-backend to Docker Hub.
# GitHub repo secrets (chỉ 2): DOCKER_USERNAME, DOCKER_PASSWORD
# Mọi config runtime khác → env Dokploy / docker/.env

name: Docker publish

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "docker/Dockerfile"
      - "Directory.Build.props"
      - "global.json"
      - "Wokki.slnx"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: wokki-backend

jobs:
  publish:
    runs-on: ubuntu-latest
    concurrency:
      group: docker-publish-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push (attempt 1)
        id: build_push_1
        uses: docker/build-push-action@v6
        continue-on-error: true
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (attempt 2)
        id: build_push_2
        if: steps.build_push_1.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure build and push succeeded
        if: steps.build_push_1.outcome == 'failure' && steps.build_push_2.outcome == 'failure'
        run: |
          echo "Both build/push attempts failed."
          exit 1

      - name: Verify latest tag is pullable and non-Alpine
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          echo "Verifying $IMAGE"

          for attempt in 1 2 3 4 5; do
            echo "Verification attempt $attempt/5"
            docker pull "$IMAGE"
            if docker run --rm --entrypoint cat "$IMAGE" /etc/os-release | grep -q "Alpine"; then
              echo "Image still reports Alpine; waiting for registry consistency..."
              sleep 10
              continue
            fi

            echo "Verified non-Alpine runtime image."
            exit 0
          done

          echo "latest tag is still Alpine after retries; failing publish."
          exit 1
