# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  SLN: Wokki.slnx
  API_PROJECT: src/Wokki.Api
  MIGRATION_PROJECT: src/Wokki.Infrastructure
  MIGRATIONS_DIR: Persistence/Migrations
  COMPOSE: docker compose -f docker/docker-compose.dev.yml --env-file docker/.env.local
  COMPOSE_PROD: docker compose -f docker/docker-compose.prod.yml --env-file docker/.env

tasks:
  default:
    desc: List all available tasks
    silent: true
    cmds:
      - task --list

  # ── Application ──────────────────────────────────────────────────────────────

  build:
    desc: Build the solution (incremental)
    sources:
      - 'src/**/*.cs'
      - 'src/**/*.csproj'
      - '{{.SLN}}'
    cmds:
      - dotnet build {{.SLN}}

  run:
    desc: Run the API locally (.NET)
    cmds:
      - dotnet run --project {{.API_PROJECT}}

  clean:
    desc: Clean all build artifacts
    cmds:
      - dotnet clean {{.SLN}}

  # ── Migrations ───────────────────────────────────────────────────────────────

  'migration:add':
    desc: 'Add a migration (usage: task migration:add -- <Name>)'
    requires:
      vars: [CLI_ARGS]
    cmds:
      - dotnet ef migrations add {{.CLI_ARGS}}
          --project {{.MIGRATION_PROJECT}}
          --startup-project {{.API_PROJECT}}
          --output-dir {{.MIGRATIONS_DIR}}

  'migration:remove':
    desc: Remove the last migration
    cmds:
      - dotnet ef migrations remove
          --project {{.MIGRATION_PROJECT}}
          --startup-project {{.API_PROJECT}}

  'migration:update':
    desc: Apply pending migrations to the database
    cmds:
      - dotnet ef database update
          --project {{.MIGRATION_PROJECT}}
          --startup-project {{.API_PROJECT}}

  # ── Docker ───────────────────────────────────────────────────────────────────

  'docker:up':
    desc: Start dev stack (Postgres + API)
    cmds:
      - '{{.COMPOSE}} up -d'

  'docker:postgres':
    desc: Start Postgres + Redis (for task run)
    cmds:
      - '{{.COMPOSE}} up -d postgres redis'

  'docker:build':
    desc: Rebuild images and start dev stack
    cmds:
      - '{{.COMPOSE}} up -d --build'

  'docker:down':
    desc: Stop dev containers (volumes preserved)
    cmds:
      - '{{.COMPOSE}} down'

  'docker:clear':
    desc: Stop dev containers and remove all volumes
    cmds:
      - '{{.COMPOSE}} down -v'

  'docker:prod':
    desc: Build and start prod stack (requires docker/.env)
    cmds:
      - '{{.COMPOSE_PROD}} up -d --build'

  # ── Git ──────────────────────────────────────────────────────────────────────

  pull:
    desc: 'Pull latest (usage: task pull  or  task pull br=<branch>)'
    vars:
      BRANCH: '{{default "" .br}}'
    cmds:
      - '{{if .BRANCH}}git checkout {{.BRANCH}} && {{end}}git pull'
