name: wokki-dev

# Env: docker/.env.local — task docker:build | docker:up

x-logging: &wokki-dev-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "2"

services:
  wokki_postgres:
    image: postgres:16-alpine
    container_name: wokki_postgres_dev
    restart: unless-stopped
    logging: *wokki-dev-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - wokki_postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  wokki_redis:
    image: redis:7-alpine
    container_name: wokki_redis_dev
    restart: unless-stopped
    logging: *wokki-dev-logging
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - wokki_redis_data_dev:/data
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 192M

  wokki_api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      cache_from:
        - wokki/wokki-backend:dev
    image: wokki/wokki-backend:dev
    container_name: wokki_api_dev
    restart: unless-stopped
    init: true
    logging: *wokki-dev-logging
    depends_on:
      wokki_postgres:
        condition: service_healthy
      wokki_redis:
        condition: service_healthy
    ports:
      - "${API_PORT}:8386"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://+:8386
      ConnectionStrings__DefaultConnection: >-
        Host=wokki_postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true
      ConnectionStrings__Redis: wokki_redis:6379
      Database__AutoMigrate: ${DATABASE_AUTOMIGRATE}
      ApiDocs__Enabled: ${APIDOCS_ENABLED}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__UseSsl: ${SMTP_USE_SSL}
      Smtp__From: ${SMTP_FROM}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}
      AWS__Region: ${AWS_REGION}
      AWS__AccessKeyId: ${AWS_ACCESS_KEY_ID}
      AWS__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      AWS__Bedrock__Region: ${AWS_REGION}
      AWS__Bedrock__ModelId: ${BEDROCK_MODEL_ID}
    deploy:
      resources:
        limits:
          memory: 1G

  wokki_pgweb:
    image: sosedoff/pgweb:0.16.2
    container_name: wokki_pgweb_dev
    restart: unless-stopped
    logging: *wokki-dev-logging
    depends_on:
      wokki_postgres:
        condition: service_healthy
    ports:
      - "${DB_UI_PORT}:8081"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@wokki_postgres:5432/${POSTGRES_DB}?sslmode=disable
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  wokki_postgres_data_dev:
  wokki_redis_data_dev:
