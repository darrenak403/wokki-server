# Usage: docker compose -f docker/docker-compose.prod.yml --env-file docker/.env up -d
# task docker:prod
#
# CI/CD: GitHub Actions → Docker Hub → Dokploy pull
# GitHub repo secrets (chỉ 2): DOCKER_USERNAME, DOCKER_PASSWORD
# Còn lại: env trên Dokploy hoặc docker/.env

name: wokki

x-logging: &wokki-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  wokki_api:
    container_name: wokki_api
    pull_policy: always
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    image: ${DOCKER_USERNAME:?DOCKER_USERNAME is required}/wokki-backend:${IMAGE_TAG:-latest}
    init: true
    logging: *wokki-logging
    ports:
      - "${API_PORT:-8386}:8386"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8386
      - DOTNET_gcServer=1
      - ASPNETCORE_Kestrel__Limits__MaxConcurrentConnections=1000
      - ASPNETCORE_Kestrel__Limits__MaxConcurrentUpgradedConnections=256
      - ConnectionStrings__DefaultConnection=Host=wokki_postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100
      - ConnectionStrings__Redis=wokki_redis:6379,abortConnect=false,connectRetry=3
      - Database__AutoMigrate=${DATABASE_AUTOMIGRATE:-false}
      - ApiDocs__Enabled=${APIDOCS_ENABLED:-false}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__AccessTokenMinutes=${JWT_ACCESS_TOKEN_MINUTES:-60}
      - Cors__AllowAnyOrigin=${CORS_ALLOW_ANY_ORIGIN:-true}
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__UseSsl=${SMTP_USE_SSL}
      - Smtp__From=${SMTP_FROM}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET}
      - AWS__Region=${AWS_REGION}
      - AWS__AccessKeyId=${AWS_ACCESS_KEY_ID}
      - AWS__SecretAccessKey=${AWS_SECRET_ACCESS_KEY}
      - AWS__Bedrock__Region=${AWS_REGION}
      - AWS__Bedrock__ModelId=${BEDROCK_MODEL_ID}
    depends_on:
      wokki_postgres:
        condition: service_healthy
      wokki_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8386/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: ${API_MEMORY_LIMIT:-1024M}
    restart: unless-stopped
    networks:
      - wokki-network

  wokki_postgres:
    container_name: wokki_postgres
    image: postgres:16-alpine
    logging: *wokki-logging
    shm_size: 256mb
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=512MB
      - -c
      - work_mem=8MB
    volumes:
      - wokki_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-768M}
    restart: unless-stopped
    networks:
      - wokki-network

  wokki_redis:
    container_name: wokki_redis
    image: redis:7-alpine
    logging: *wokki-logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-backlog
      - "511"
      - --protected-mode
      - "no"
    volumes:
      - wokki_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-384M}
    restart: unless-stopped
    networks:
      - wokki-network

  wokki_dbgate:
    container_name: wokki_dbgate
    image: dbgate/dbgate:latest
    pull_policy: always
    logging: *wokki-logging
    ports:
      - "127.0.0.1:${DBGATE_PORT:-5050}:3000"
    environment:
      - CONNECTIONS=con1
      - LABEL_con1=Wokki
      - SERVER_con1=wokki_postgres
      - USER_con1=${POSTGRES_USER}
      - PASSWORD_con1=${POSTGRES_PASSWORD}
      - PORT_con1=5432
      - ENGINE_con1=postgres@dbgate-plugin-postgres
    depends_on:
      wokki_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - wokki-network

volumes:
  wokki_postgres_data:
  wokki_redis_data:

networks:
  wokki-network:
    name: wokki-network
