name: wokki-prod

# Env: docker/.env only (copy từ .env.example khi deploy). Không dùng .env.local.
# task docker:prod — hoặc: docker compose -f docker-compose.prod.yml --env-file .env up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: wokki-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - wokki_pg_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # Không expose Postgres ra host trong prod (bỏ comment nếu cần debug)
    # ports:
    #   - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: wokki-redis-prod
    restart: always
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - wokki_redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: wokki-api-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT}:8386"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8386
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      Database__AutoMigrate: ${DATABASE_AUTOMIGRATE:-false}
      ApiDocs__Enabled: ${APIDOCS_ENABLED:-false}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__Secret: ${JWT_SECRET}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__UseSsl: ${SMTP_USE_SSL}
      Smtp__From: ${SMTP_FROM}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      AWS__Region: ${AWS_REGION}
      AWS__AccessKeyId: ${AWS_ACCESS_KEY_ID}
      AWS__SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
      AWS__Bedrock__Region: ${AWS_REGION}
      AWS__Bedrock__ModelId: ${BEDROCK_MODEL_ID}

  db-ui:
    image: dpage/pgadmin4:9.3
    container_name: wokki-pgadmin-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    # Chỉ mở local host để quản trị khi cần
    ports:
      - "127.0.0.1:${DB_UI_PORT}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${DB_UI_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${DB_UI_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"

volumes:
  wokki_pg_data_prod:
  wokki_redis_data_prod:
