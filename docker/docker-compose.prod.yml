# Usage: docker compose -f docker/docker-compose.prod.yml --env-file docker/.env up -d
# CI/CD: GitHub Actions → Docker Hub → Dokploy
# Deploy BE trước FE — tạo network wokki-network
# DbGate (optional): --profile tools

name: wokki

x-logging: &wokki-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &wokki-security
  init: true
  security_opt:
    - no-new-privileges:true

services:
  wokki_api:
    container_name: wokki_api
    image: ${DOCKER_USERNAME}/wokki-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    <<: *wokki-security
    cap_drop:
      - ALL
    logging: *wokki-logging
    ports:
      - "${API_PORT:-8386}:8386"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8386
      - DOTNET_gcServer=1
      - DOTNET_ThreadPool_UnfairSemaphoreSpinLimit=6
      - ASPNETCORE_Kestrel__Limits__MaxConcurrentConnections=1000
      - ASPNETCORE_Kestrel__Limits__MaxConcurrentUpgradedConnections=256
      - ConnectionStrings__DefaultConnection=Host=wokki_postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true;Minimum Pool Size=5;Maximum Pool Size=100;Connection Idle Lifetime=300;Connection Pruning Interval=10
      - ConnectionStrings__Redis=wokki_redis:6379,abortConnect=false,connectRetry=3,connectTimeout=5000
      - Database__AutoMigrate=${DATABASE_AUTOMIGRATE:-false}
      - ApiDocs__Enabled=${APIDOCS_ENABLED:-false}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__AccessTokenMinutes=${JWT_ACCESS_TOKEN_MINUTES:-60}
      - Cors__AllowAnyOrigin=${CORS_ALLOW_ANY_ORIGIN:-true}
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__UseSsl=${SMTP_USE_SSL}
      - Smtp__From=${SMTP_FROM}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Cloudinary__CloudName=${CLOUDINARY_CLOUD_NAME}
      - Cloudinary__ApiKey=${CLOUDINARY_API_KEY}
      - Cloudinary__ApiSecret=${CLOUDINARY_API_SECRET}
      - AWS__Region=${AWS_REGION}
      - AWS__AccessKeyId=${AWS_ACCESS_KEY_ID}
      - AWS__SecretAccessKey=${AWS_SECRET_ACCESS_KEY}
      - AWS__Bedrock__Region=${AWS_REGION}
      - AWS__Bedrock__ModelId=${BEDROCK_MODEL_ID}
    depends_on:
      wokki_postgres:
        condition: service_healthy
      wokki_redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-2.0}"
          memory: ${API_MEMORY_LIMIT:-1024M}
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8386/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - wokki-network

  wokki_postgres:
    container_name: wokki_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    <<: *wokki-security
    logging: *wokki-logging
    shm_size: 256mb
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=512MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - wal_buffers=16MB
      - -c
      - random_page_cost=1.1
    volumes:
      - wokki_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPU_LIMIT:-1.0}"
          memory: ${POSTGRES_MEMORY_LIMIT:-768M}
    networks:
      - wokki-network

  wokki_redis:
    container_name: wokki_redis
    image: redis:7-alpine
    restart: unless-stopped
    <<: *wokki-security
    logging: *wokki-logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --tcp-backlog
      - "511"
      - --timeout
      - "300"
      - --tcp-keepalive
      - "60"
      - --protected-mode
      - "no"
    volumes:
      - wokki_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: ${REDIS_MEMORY_LIMIT:-384M}
    networks:
      - wokki-network

  wokki_dbgate:
    profiles: ["tools"]
    container_name: wokki_dbgate
    image: dbgate/dbgate:latest
    restart: unless-stopped
    <<: *wokki-security
    logging: *wokki-logging
    ports:
      - "127.0.0.1:${DBGATE_PORT:-5050}:3000"
    environment:
      - CONNECTIONS=con1
      - LABEL_con1=Wokki
      - SERVER_con1=wokki_postgres
      - USER_con1=${POSTGRES_USER}
      - PASSWORD_con1=${POSTGRES_PASSWORD}
      - PORT_con1=5432
      - ENGINE_con1=postgres@dbgate-plugin-postgres
    depends_on:
      wokki_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - wokki-network

volumes:
  wokki_postgres_data:
  wokki_redis_data:

networks:
  wokki-network:
    name: wokki-network
    driver: bridge
